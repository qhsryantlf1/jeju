<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주과고 교무실 TV 게시판</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app" class="board">
  <aside class="calendar-panel">
    <div id="pdf-viewer" class="schedule-panel"></div>
    <footer class="calendar-toolbar">
      <div class="color-legend">
        <span class="legend-item color-departure">귀가</span>
        <span class="legend-item color-pink">전일제</span>
        <span class="legend-item color-red">공휴일</span>
      </div>
      <div class="toolbar-actions">
        <button type="button" id="fullscreen-btn" class="upload-btn" title="전체화면 (F11)">전체화면</button>
      </div>
    </footer>
  </aside>

  <aside class="status-panel">
    <h2 id="schedule-title" class="schedule-title"></h2>
    <div id="status-clock" class="status-clock">
      <p class="status-clock-date"></p>
      <p class="status-clock-time"></p>
    </div>
    <div class="status-sheets-wrap">
      <section id="student-status" class="status-sheet-block status-student" aria-label="학생 현황"></section>
      <section id="school-info" class="status-sheet-block status-school" aria-label="학교 정보"></section>
    </div>
  </aside>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <p id="modal-text"></p>
      <button id="modal-close">확인</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
